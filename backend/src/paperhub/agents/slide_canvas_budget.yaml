# F4.5 canvas-budget yaml (operator-tunable; NO thresholds hardcoded in Python).
# Each layout declares its text-region geometry; the detector computes token
# capacity from real (width_cm × height_cm) with script-aware constants below.
#
# `matches_aspect` filters which figure aspects are eligible for the layout.
# Format: ">= X" / "<= X" / "X..Y" / "any" / "no_figure".

constants:
  frame_canvas_cm: [12.8, 6.5]
  line_height_cm: 0.65
  bullet_pitch_factor: 1.6
  chars_per_cm:
    en: 12.0
    cjk: 8.0
  chars_per_word: 6.0
  # Aspect-mismatch tolerance for the layout_aspect_mismatch flag.
  aspect_mismatch_strict: false

layouts:
  text_only:
    matches_aspect: no_figure
    figure_region_cm: [0.0, 0.0]
    text_region_cm: [12.8, 6.5]
    text_structure_hint: "≤8 stacked bullets, ≤16 words each, OR 2-3 short paragraphs"

  figure_left_half_portrait:
    matches_aspect: "0.5..1.3"
    figure_region_cm: [6.0, 6.5]
    text_region_cm: [6.8, 6.5]
    text_structure_hint: "4-5 stacked bullets, ≤14 words each"

  figure_right_half_portrait:
    matches_aspect: "0.5..1.3"
    figure_region_cm: [6.0, 6.5]
    text_region_cm: [6.8, 6.5]
    text_structure_hint: "4-5 stacked bullets, ≤14 words each"

  figure_left_third_portrait:
    matches_aspect: "0.4..0.9"
    figure_region_cm: [4.0, 6.5]
    text_region_cm: [8.8, 6.5]
    text_structure_hint: "denser bullet list, ≤6 items"

  figure_top_full_landscape:
    matches_aspect: ">= 1.5"
    figure_region_cm: [12.8, 4.0]
    text_region_cm: [12.8, 2.5]
    text_structure_hint: "1 short takeaway OR ≤3 single-line bullets"

  figure_bottom_full_landscape:
    matches_aspect: ">= 1.5"
    figure_region_cm: [12.8, 4.0]
    text_region_cm: [12.8, 2.5]
    text_structure_hint: "1 short takeaway OR ≤3 single-line bullets"

  figure_inset_small_text_around:
    matches_aspect: any
    figure_region_cm: [4.0, 3.0]
    text_region_cm: [8.8, 6.5]
    text_structure_hint: "small icon + flowing prose around it"

  figure_only_full_width:
    matches_aspect: any
    figure_region_cm: [12.8, 6.0]
    text_region_cm: [12.8, 0.5]
    text_structure_hint: "1-line caption only"

  comparison_two_figures_side_by_side:
    matches_aspect: any
    figure_region_cm: [12.8, 5.0]
    text_region_cm: [12.8, 1.5]
    text_structure_hint: "1-line caption per side"

  equation_centered:
    matches_aspect: no_figure
    figure_region_cm: [0.0, 0.0]
    text_region_cm: [12.8, 3.5]
    text_structure_hint: "notation legend + 1-2 sentence interpretation"
    requires_math_block: true

  table_only:
    matches_aspect: no_figure
    figure_region_cm: [0.0, 0.0]
    text_region_cm: [12.8, 1.5]
    text_structure_hint: "tabular block + 1-2 follow-up sentences only"

  title_frame:
    matches_aspect: no_figure
    figure_region_cm: [0.0, 0.0]
    text_region_cm: [12.8, 6.5]
    text_structure_hint: "talk title + author + date + institute (rendered via \\titlepage; NO custom centered Large)"

  closer_frame:
    matches_aspect: no_figure
    figure_region_cm: [0.0, 0.0]
    text_region_cm: [12.8, 6.5]
    text_structure_hint: "summary takeaway bullets + optional open question (uses normal \\begin{frame}{Title} like body — NOT [plain] + Large)"
